<app-custom-header title="{{ 'app.page10' | translate }}" [count]="dryingAnimals.length.toString()" [isLoading]="isLoading"
  (close)="goBack()" (clear)="onBlurSearchBar()" (ionInput)="handleInput($event)"></app-custom-header>

<ion-content class="custom-content">
  <ion-grid class="top-level-grid">
    <ion-row class="top-level-row" *ngIf="!isLoading && dryingAnimals.length > 0">
      <ion-col class="top-level-col">
        <ion-card *ngFor="let dryingAnimal of results | paginate: { 
    id: 'dryoff_pager',
    itemsPerPage: pageSize, 
    currentPage: p, 
    totalItems: totalCount 
  }; let i = index">
          <ion-row class="row-2" [routerLink]="[
              '/',
              'animal-list',
              dryingAnimal.animal.collar.name
            ]" routerLinkActive="router-link-active">
            <ion-col>
              <ion-row>
                <ion-col>
                  <div>
                    <ion-label>
                      <h4>{{ 'list.col3' | translate }}</h4>
                    </ion-label>
                  </div>
                </ion-col>
                <ion-col>
                  <div>
                    <ion-label>
                      <h4>{{ 'list.col14' | translate }}</h4>
                    </ion-label>
                  </div>
                </ion-col>
                <ion-col>
                  <div>
                    <ion-label>
                      <h4>{{ 'list.col8' | translate }}</h4>
                    </ion-label>
                  </div>
                </ion-col>
              </ion-row>
              <ion-row>
                <ion-col>
                  <div>
                    <ion-label>
                      <h2>
                        {{ dryingAnimal["animal"]["collar"]["collarId"] }}
                      </h2>
                    </ion-label>
                  </div>
                </ion-col>
                <ion-col>
                  <div>
                    <ion-label class="datetime">
                      <h2>{{ dryingAnimal["eventDateTime"] | utcToIst}}</h2>
                    </ion-label>
                  </div>
                </ion-col>
                <ion-col>
                  <div>
                    <ion-label>
                      <h2>
                        {{ dryingAnimal["isActive"] ? "Drying" : "Normal" }}
                      </h2>
                    </ion-label>
                  </div>
                </ion-col>
              </ion-row>
            </ion-col>
          </ion-row>
        </ion-card>
      </ion-col>
    </ion-row>

    <ion-row *ngIf="!isLoading && dryingAnimals.length === 0">
      <ion-col>
       <ion-toolbar>  
          <ion-item>
            <ion-chip>
              <ion-icon name="alert-circle"></ion-icon>
              <ion-label color="medium">{{ 'list.placeholder' | translate }}</ion-label>
            </ion-chip>
          </ion-item>
        </ion-toolbar>
      </ion-col>
    </ion-row>

  </ion-grid>
</ion-content>

<ion-footer>
  <ion-toolbar>
    <pagination-controls id="dryoff_pager" (pageChange)="onPageChange($event)">
    </pagination-controls>
  </ion-toolbar>
</ion-footer>
